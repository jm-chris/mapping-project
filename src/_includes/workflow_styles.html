/* ── 15. SIMPLIFIED TOC RAIL (H2 dots only, larger and more spaced) ── */
#toc-rail {
  position: fixed;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
#toc-rail .toc-track {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  background: #e0e0e0;
  border-radius: 2px;
  z-index: 0;
}
#toc-rail .toc-progress {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  background: #2B3AA8;
  border-radius: 2px;
  height: 0%;
  z-index: 1;
  transition: height 0.15s ease;
}
.toc-dot-wrap {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 0;
}
.toc-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #ccc;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1.5px #ccc;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  display: block;
}
.toc-dot.active {
  background: #2B3AA8;
  box-shadow: 0 0 0 1.5px #2B3AA8;
  transform: scale(1.25);
}
.toc-tooltip {
  position: absolute;
  right: 22px;
  background: #1a1a1a;
  color: #fff;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.03em;
  padding: 4px 10px;
  border-radius: 3px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
}
.toc-dot-wrap:hover .toc-tooltip { opacity: 1; }

@media (max-width: 900px) {
  #toc-rail { display: none; }

<script>
document.addEventListener('DOMContentLoaded', function() {
  var dots = document.querySelectorAll('.toc-dot');
  var progressBar = document.getElementById('toc-progress-bar');
  var rail = document.getElementById('toc-rail');
  if (!dots.length || !rail) return;
  var sections = [];
  dots.forEach(function(dot) {
    var id = dot.getAttribute('data-target');
    var el = document.getElementById(id);
    if (el) sections.push({ dot: dot, el: el });
    dot.addEventListener('click', function() {
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  function update() {
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    if (progressBar) progressBar.style.height = progress + '%';
    var active = 0;
    for (var i = 0; i < sections.length; i++) {
      if (sections[i].el.getBoundingClientRect().top <= 130) active = i;
    }
    dots.forEach(function(d) { d.classList.remove('active'); });
    if (sections[active]) sections[active].dot.classList.add('active');
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
});
</script>
